# Codemagic configuration for Flutter Android build
# For more details, see: https://docs.codemagic.io/yaml/building-a-flutter-app/

workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - default_group
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          if [ -d "flutter_project" ]; then
            cd flutter_project
          fi
          flutter create --platforms=android .
          flutter packages pub get
      - name: Build Android APK
        script: |
          if [ -d "flutter_project" ]; then
            cd flutter_project
          fi
          flutter build apk --release
    artifacts:
      - flutter_project/build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/flutter-apk/*.apk