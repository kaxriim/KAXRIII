# Codemagic configuration for Flutter Android build
# For more details, see: https://docs.codemagic.io/yaml/building-a-flutter-app/

workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - default_group
      flutter: stable
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
